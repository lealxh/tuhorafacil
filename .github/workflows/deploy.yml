name: CI y deploy

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verificar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # wrangler types infiere los tipos de los secrets desde .dev.vars (gitignorado):
      # sin esto, Env sale sin ANTHROPIC_API_KEY etc. y el typecheck falla en CI
      - name: Crear .dev.vars desde los ejemplos
        run: |
          cp apps/api/.dev.vars.example apps/api/.dev.vars
          cp apps/web/.dev.vars.example apps/web/.dev.vars
      - run: pnpm -r check
      - run: pnpm -r test
      - run: pnpm -r build

  deploy:
    # Requiere secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
    needs: verificar
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Migrar base de datos (D1)
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
          command: d1 migrations apply tuhorafacil --remote
      - name: Deploy API
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/api
      - name: Build web
        run: pnpm --filter @tuhorafacil/web build
      - name: Deploy web
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: apps/web
